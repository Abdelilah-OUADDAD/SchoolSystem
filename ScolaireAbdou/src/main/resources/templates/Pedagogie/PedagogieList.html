<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pedagogie List</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(120deg, #f5f7fa, #e4ecf7);
            font-family: 'Poppins', sans-serif;
        }

        .container-box {
            margin-top: 50px;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            padding: 20px;
            background: white;
        }

        .title {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            color: #0d6efd;
        }

        .table thead {
            background-color: #0d6efd;
            color: white;
        }

        .table tbody tr:hover {
            background-color: #f1f5ff;
            transition: 0.3s;
        }

        .actions .btn {
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 13px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        #searchInput {
            border-radius: 20px;
            padding: 8px 15px;
        }

        .btn-success {
            border-radius: 25px;
            padding: 8px 18px;
        }

        .badge-custom {
            background-color: #e9f2ff;
            color: #0d6efd;
            padding: 5px 10px;
            border-radius: 10px;
        }

    </style>
</head>

<body>

    
<!-- fragments/navbar -->
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container container-box">

    <div class="card">

        <h2 class="title">📚 Pedagogie List</h2>

        <!-- Top Bar -->
        <div class="top-bar">

            <!-- Add Button -->
            <a href="/PedagogieAdd" class="btn btn-success shadow-sm">
                ➕ Add New
            </a>

            <!-- Search -->
            <input type="text" id="searchInput" class="form-control w-25 shadow-sm" placeholder="🔍 Search by title...">
        </div>

        <!-- Table -->
        <div class="table-responsive">
            <table class="table table-bordered table-hover text-center align-middle">

                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Teacher</th>
                        <th>Subject</th>
                        <th>Année</th>
                        <th>Objective</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="tableBody">
                    <tr th:each="p : ${pedagogies}">

                        <td th:text="${p.title}" class="fw-semibold"></td>

                        <td th:text="${p.description}"></td>

                        <td>
                            <span class="badge-custom" th:text="${p.teacher.getNomComplet}"></span>
                        </td>

                        <td>
                            <span class="badge bg-secondary" th:text="${p.subject.name}"></span>
                        </td>

                        <td>
                            <span class="badge bg-primary" th:text="${p.annee.niveauAnnee}"></span>
                        </td>

                        <td th:text="${p.objective}"></td>

                        <!-- Actions -->
                        <td class="actions">

                            <a th:href="@{/PedagogieShow/{id}(id=${p.pedagogieID})}" 
                               class="btn btn-info btn-sm text-white shadow-sm">
                                👁
                            </a>

                            <a th:href="@{/PedagogieEdit/{id}(id=${p.pedagogieID})}" 
                               class="btn btn-warning btn-sm shadow-sm">
                                ✏
                            </a>

                            <a th:href="@{/PedagogieDelete/{id}(id=${p.pedagogieID})}" 
                               class="btn btn-danger btn-sm shadow-sm"
                               onclick="return confirm('Are you sure you want to delete this item?');">
                                🗑
                            </a>

                        </td>

                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</div>

<!-- JS Search -->
<script>
    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("keyup", function () {
        let filter = searchInput.value.toLowerCase();
        let rows = document.querySelectorAll("#tableBody tr");

        rows.forEach(row => {
            let title = row.cells[0].textContent.toLowerCase();

            row.style.display = title.includes(filter) ? "" : "none";
        });
    });
</script>

</body>
</html>
