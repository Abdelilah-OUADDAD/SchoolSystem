<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pedagogie Details</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(120deg, #f5f7fa, #e4ecf7);
            font-family: 'Poppins', sans-serif;
        }

        .container-box {
            max-width: 700px;
            margin: 60px auto;
        }

        .card {
            border: none;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .title {
            text-align: center;
            margin-bottom: 25px;
            color: #0d6efd;
            font-weight: 600;
        }

        .info-row {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .label {
            font-weight: 500;
            color: #555;
        }

        .value {
            font-weight: 600;
            color: #222;
        }

        .badge-custom {
            background-color: #e9f2ff;
            color: #0d6efd;
            padding: 5px 10px;
            border-radius: 10px;
        }

        .buttons {
            margin-top: 25px;
            text-align: center;
        }

        .btn {
            border-radius: 25px;
            padding: 8px 20px;
        }
    </style>
</head>

<body>

    
<!-- fragments/navbar -->
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container container-box">

    <div class="card">

        <h3 class="title">👁 Pedagogie Details</h3>

        <!-- Title -->
        <div class="row info-row">
            <div class="col-4 label">Title:</div>
            <div class="col-8 value" th:text="${pedagogie.title}"></div>
        </div>

        <!-- Description -->
        <div class="row info-row">
            <div class="col-4 label">Description:</div>
            <div class="col-8 value" th:text="${pedagogie.description}"></div>
        </div>

        <!-- Teacher -->
        <div class="row info-row">
            <div class="col-4 label">Teacher:</div>
            <div class="col-8">
                <span class="badge-custom" th:text="${pedagogie.teacher.getNomComplet}"></span>
            </div>
        </div>

        <!-- Subject -->
        <div class="row info-row">
            <div class="col-4 label">Subject:</div>
            <div class="col-8">
                <span class="badge bg-secondary" th:text="${pedagogie.subject.name}"></span>
            </div>
        </div>

        <!-- Année -->
        <div class="row info-row">
            <div class="col-4 label">Année:</div>
            <div class="col-8">
                <span class="badge bg-primary" th:text="${pedagogie.annee.niveauAnnee}"></span>
            </div>
        </div>

        <!-- Objective -->
        <div class="row info-row">
            <div class="col-4 label">Objective:</div>
            <div class="col-8 value" th:text="${pedagogie.objective}"></div>
        </div>

        <!-- Created At -->
        <div class="row info-row">
            <div class="col-4 label">Created At:</div>
            <div class="col-8 value" 
                 th:text="${#temporals.format(pedagogie.created_at, 'yyyy-MM-dd HH:mm')}"></div>
        </div>

        <!-- Buttons -->
        <div class="buttons">

            <a th:href="@{/PedagogieEdit/{id}(id=${pedagogie.pedagogieID})}" 
               class="btn btn-warning shadow-sm">
                ✏ Edit
            </a>

            <a href="/PedagogieList" 
               class="btn btn-secondary shadow-sm">
                ⬅ Back
            </a>

        </div>

    </div>

</div>

</body>
</html>
