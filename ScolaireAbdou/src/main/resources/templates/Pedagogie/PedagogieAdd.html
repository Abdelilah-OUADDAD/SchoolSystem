<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Pedagogie</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(120deg, #f5f7fa, #e4ecf7);
            font-family: 'Poppins', sans-serif;
        }

        .form-container {
            max-width: 700px;
            margin: 60px auto;
        }

        .card {
            border: none;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .title {
            text-align: center;
            margin-bottom: 25px;
            color: #0d6efd;
            font-weight: 600;
        }

        .form-control, .form-select {
            border-radius: 10px;
        }

        .btn {
            border-radius: 25px;
            padding: 8px 20px;
        }

        .btn-primary {
            background-color: #0d6efd;
        }

        .btn-secondary {
            margin-left: 10px;
        }

    </style>
</head>

<body>
    
<!-- fragments/navbar -->
<div th:replace="fragments/navbar :: navbar"></div>


<div class="container form-container">

    <div class="card">

        <h3 class="title">➕ Add New Pedagogie</h3>

        <form th:action="@{/PedagogieAdd}" method="post">

            <!-- Title -->
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="title"  class="form-control" placeholder="Enter title" required>
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3" placeholder="Enter description"></textarea>
            </div>

            <!-- Teacher -->
            <div class="mb-3">
                <label class="form-label">Teacher</label>
                <select name="teacher_id" class="form-select" required>
                    <option value="">-- Select Teacher --</option>
                    <option th:each="t : ${teachers}" 
                            th:value="${t.teacherId}" 
                            th:text="${t.getNomComplet}">
                    </option>
                </select>
            </div>

            <!-- Subject -->
            <div class="mb-3">
                <label class="form-label">Subject</label>
                <select name="subject_id"  class="form-select" required>
                    <option value="">-- Select Subject --</option>
                    <option th:each="s : ${subjects}" 
                            th:value="${s.subjectID}" 
                            th:text="${s.name}">
                    </option>
                </select>
            </div>

            <!-- Année -->
            <div class="mb-3">
                <label class="form-label">Année</label>
                <select name="annee_id" class="form-select" required>
                    <option value="">-- Select Année --</option>
                    <option th:each="a : ${annees}" 
                            th:value="${a.anneeId}" 
                            th:text="${a.niveauAnnee}">
                    </option>
                </select>
            </div>

            <!-- Objective -->
            <div class="mb-3">
                <label class="form-label">Objective</label>
                <textarea name="objective" class="form-control" rows="3" placeholder="Enter objective"></textarea>
            </div>

            <!-- Buttons -->
            <div class="text-center mt-4">

                <button type="submit" class="btn btn-primary shadow-sm">
                    💾 Save
                </button>

                <a href="/PedagogieList" class="btn btn-secondary shadow-sm">
                    ⬅ Back
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
