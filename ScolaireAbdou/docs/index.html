<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
        }

        .card-box {
            border-radius: 15px;
            padding: 20px;
            color: white;
            transition: 0.3s;
        }

        .card-box:hover {
            transform: scale(1.03);
        }

        .bg1 { background: linear-gradient(45deg, #4e73df, #224abe); }
        .bg2 { background: linear-gradient(45deg, #1cc88a, #13855c); }
        .bg3 { background: linear-gradient(45deg, #36b9cc, #258391); }
        .bg4 { background: linear-gradient(45deg, #f6c23e, #dda20a); color:black;}

        .section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .progress {
            height: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">
    
    <!-- Stats -->
    <div class="row g-3">

        
        <div class="col-md-3">
            <a href="User.html" target="_blank" style="text-decoration:none;">
                <div class="card-box bg1">
                    <h6>Users</h6>
                    <h3 th:text="${userCount}">5</h3>
                </div>
            </a>
        </div>

        <div class="col-md-3">
             <a href="Student.html" target="_blank" style="text-decoration:none;">
            <div class="card-box bg2">
                <h6>Students</h6>
                <h3 th:text="${studentCount}">33</h3>
            </div>
            </a>
        </div>

        <div class="col-md-3">
             <a href="Teacher.html" target="_blank" style="text-decoration:none;">
            <div class="card-box bg3">
                <h6>Teachers</h6>
                <h3 th:text="${teacherCount}">11</h3>
            </div>
            </a>
        </div>

        <div class="col-md-3">
             <a href="Pedagogie.html" target="_blank" style="text-decoration:none;">
            <div class="card-box bg4">
                <h6>Pedagogies</h6>
                <h3 th:text="${pedagogieCount}">10</h3>
            </div>
            </a>
        </div>

    </div>

    <!-- Progress Section -->
    <div class="section">
        <h5>📊 Distribution</h5>

        <p>Students</p>
        <div class="progress mb-3">
            <div class="progress-bar bg-success" style="width: 60%"></div>
        </div>

        <p>Teachers</p>
        <div class="progress mb-3">
            <div class="progress-bar bg-info" style="width: 30%"></div>
        </div>

        <p>Pedagogies</p>
        <div class="progress mb-3">
            <div class="progress-bar bg-warning" style="width: 50%"></div>
        </div>
    </div>

    <!-- Recent Activity -->
    <div class="section">
        <h5>🕒 Recent Activity</h5>

        <ul class="list-group">
            <li class="list-group-item">New student added</li>
            <li class="list-group-item">Teacher updated profile</li>
            <li class="list-group-item">New pedagogie created</li>
        </ul>
    </div>

    <!-- Quick Actions -->
    <div class="section">
        <h5>⚡ Quick Actions</h5>

        <a th:href="@{/StudentAdd}" class="btn btn-success m-1">+ Add Student</a>
        <a th:href="@{/TeacherAdd}" class="btn btn-info m-1">+ Add Teacher</a>
        <a th:href="@{/PedagogieAdd}" class="btn btn-warning m-1">+ Add Pedagogie</a>
    </div>

</div>

</body>
</html>
